name: ToDo LINE
on:
  workflow_dispatch:
    inputs:
      task:
        description: task
        required: true
      priority:
        description: priority
        default: mid
      link:
        description: link
        required: true
jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: send LINE
        env:
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          TASK: ${{ github.event.inputs.task }}
          PRIORITY: ${{ github.event.inputs.priority }}
          LINK: ${{ github.event.inputs.link }}
        run: |
          if   [ "$PRIORITY" = "high" ]; then LABEL="🔴 高優先度"
          elif [ "$PRIORITY" = "low"  ]; then LABEL="🔵 低優先度"
          else LABEL="🟡 中優先度"; fi

          TEXT="$(printf '📝 ToDoに追加\n━━━━━━━━━━━━\n%s\n%s\n━━━━━━━━━━━━\nタップして追加 👇\n%s' "$TASK" "$LABEL" "$LINK")"

          PAYLOAD=$(jq -n --arg to "$LINE_USER_ID" --arg text "$TEXT" \
            '{to: $to, messages: [{type: "text", text: $text}]}')

          curl -sf -X POST https://api.line.me/v2/bot/message/push \
            -H "Authorization: Bearer $LINE_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" && echo "LINE送信成功"
