name: ToDo LINE
on:
  workflow_dispatch:
    inputs:
      task:
        description: task
        required: true
      priority:
        description: priority
        default: mid
      link:
        description: link
        required: true
jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: send LINE
        env:
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          TASK: ${{ github.event.inputs.task }}
          PRIORITY: ${{ github.event.inputs.priority }}
          LINK: ${{ github.event.inputs.link }}
        run: |
          python3 - << 'EOF'
import os, json, urllib.request
token   = os.environ["LINE_TOKEN"]
user_id = os.environ["LINE_USER_ID"]
task    = os.environ["TASK"]
priority = os.environ["PRIORITY"]
link    = os.environ["LINK"]

# 優先度ラベル
label = {"high": "🔴 高優先度", "mid": "🟡 中優先度", "low": "🔵 低優先度"}.get(priority, "🟡 中優先度")
text = f"📝 ToDoに追加\n━━━━━━━━━━━━\n{task}\n{label}\n━━━━━━━━━━━━\nタップして追加 👇\n{link}"

payload = json.dumps({"to": user_id, "messages": [{"type": "text", "text": text}]}).encode()
req = urllib.request.Request(
    "https://api.line.me/v2/bot/message/push",
    data=payload,
    headers={"Authorization": f"Bearer {token}", "Content-Type": "application/json"},
    method="POST"
)
with urllib.request.urlopen(req) as res:
    print("OK:", res.status)
EOF
